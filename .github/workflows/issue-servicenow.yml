name: Issue → ServiceNow
on:
  issues:
    types: [opened, edited, labeled]


concurrency:
  group: sn-pipeline-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.c.outputs.should_run }}
      should_update: ${{ steps.c.outputs.should_update }}
      issue_number: ${{ steps.c.outputs.issue_number }}
      label_name: ${{ steps.c.outputs.label_name }}
    steps:
      - id: c
        uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const labelName = context.payload.label?.name ?? '';
            const action = context.payload.action || context.eventName;

            const markers = ['SR Generic', 'SR Request Logs', 'SR Standard Generic', 'SR Information'];
            const hasMarker = markers.some(m => (issue.body || '').includes(m));

            // Run on:
            // - labeled: only when SR labels are added
            // - opened/edited: only when this looks like an SR template issue
            const isSrLabel = labelName.startsWith('SRType/') || labelName.startsWith('CatalogueItem/');
            const shouldConsider =
              (action === 'labeled' && isSrLabel) ||
              ((action === 'opened' || action === 'edited') && (hasMarker || (issue.title || '').startsWith('[SR-Change]:')));

            if (!shouldConsider) {
              core.setOutput('should_run',    'false');
              core.setOutput('should_update', 'false');
              core.setOutput('issue_number',  String(issue.number));
              core.setOutput('label_name',    labelName);
              return;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number
            });
            const caseDone = comments.some(c => c.user.type === 'Bot' && c.body.includes('ServiceNow Case Created Successfully'));
            // If case already exists and this is an edit → update path; otherwise normal create path
            const isEdit = (action === 'edited');
            core.setOutput('should_run',    String(!caseDone));
            core.setOutput('should_update', String(caseDone && isEdit));
            core.setOutput('issue_number',  String(issue.number));
            core.setOutput('label_name',    labelName);

  validate:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      validation_passed: ${{ steps.v.outputs.validation_passed }}
      sr_type: ${{ steps.v.outputs.sr_type }}
      case_type: ${{ steps.v.outputs.case_type }}
      catalog_item: ${{ steps.v.outputs.catalog_item }}
      catalog_prefix: ${{ steps.v.outputs.catalog_prefix }}
      failure_reason: ${{ steps.v.outputs.failure_reason }}
    steps:
      - id: v
        uses: actions/github-script@v8
        with:
          script: |
            const issueNumber = context.payload.issue?.number ?? parseInt('${{ needs.gate.outputs.issue_number }}', 10);
            const labelName = context.payload.label?.name ?? '${{ needs.gate.outputs.label_name }}';
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber
            });
            const issueTitle = issue.title || '';
            const issueBody = issue.body || '';
            const labels = issue.labels.map(l => l.name);
            const srTypeLabel = labels.find(l => l.startsWith('SRType/'));
            const catalogLabel = labels.find(l => l.startsWith('CatalogueItem/'));
            const { data: commentsEarly } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber
            });
            const caseCreated = commentsEarly.some(c => c.user.type === 'Bot' && c.body.includes('ServiceNow Case Created Successfully'));
            function sectionAfterHeader(body, header) {
              const esc = header.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const re = new RegExp(`###\\s+${esc}\\s*\\n+([^\\n][\\s\\S]*?)(?=\\n+###|\\n*$)`, 'i');
              const m = body.match(re);
              return m ? m[1].trim() : '';
            }
            if (issue.labels.some(l => l.name === 'validation-passed') && !caseCreated && srTypeLabel && catalogLabel) {
              core.setOutput('validation_passed', 'true');
              core.setOutput('sr_type', srTypeLabel.replace('SRType/', ''));
              core.setOutput('case_type', 'Service Request');
              core.setOutput('catalog_item', catalogLabel.replace('CatalogueItem/', ''));
              core.setOutput('catalog_prefix', catalogLabel);
              core.setOutput('failure_reason', '');
              return;
            }
            const validMarkers = ['SR Generic', 'SR Request Logs', 'SR Standard Generic', 'SR Information'];
            const hasValidMarker = validMarkers.some(m => issueBody.includes(m));
            async function failValidation(message, reason) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber
              });
              for (const c of comments) {
                if (c.user.type === 'Bot' && c.body.includes('Template Validation')) {
                  await github.rest.issues.deleteComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id });
                }
              }
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, body: message });
              for (const lbl of labels.filter(l => l.startsWith('SRType/') || l.startsWith('CatalogueItem/'))) {
                try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, name: lbl }); } catch (_) {}
              }
              try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, name: 'validation-passed' }); } catch (_) {}
              core.setOutput('validation_passed', 'false');
              core.setOutput('failure_reason', reason);
              core.setFailed('Validation: ' + reason);
            }
            if (!hasValidMarker) {
              if (srTypeLabel || catalogLabel) {
                const { data: existing } = await github.rest.issues.listComments({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber
                });
                const warned = existing.some(c => c.user.type === 'Bot' && c.body.includes('Invalid Template for Service Request Labels'));
                if (!warned) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber,
                    body: `❌ Template Validation Failed\n\n**Invalid Template for Service Request Labels.**\n\nRemove SR labels or use an official SR template.`
                  });
                  for (const lbl of [srTypeLabel, catalogLabel].filter(Boolean)) {
                    try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, name: lbl }); } catch (_) {}
                  }
                  try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, name: 'validation-passed' }); } catch (_) {}
                }
              }
              core.setOutput('validation_passed', 'false');
              core.setOutput('failure_reason', 'Not an SR template');
              return;
            }
            if (!srTypeLabel || !catalogLabel) {
              let msg = !srTypeLabel && !catalogLabel
                ? `❌ Template Validation Failed\n\n**Missing:** \`SRType/\` and \`CatalogueItem/\` labels`
                : !srTypeLabel ? `❌ Template Validation Failed\n\n**Missing SRType/** (you have ${catalogLabel})`
                : `❌ Template Validation Failed\n\n**Missing CatalogueItem/** (you have ${srTypeLabel})`;
              const { data: ex } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber });
              const dup = ex.some(c => c.user.type === 'Bot' && c.body.includes('Template Validation Failed') && c.body.includes('Missing'));
              if (!dup) await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, body: msg });
              try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, name: 'validation-passed' }); } catch (_) {}
              core.setOutput('validation_passed', 'false');
              core.setOutput('failure_reason', 'Missing required labels');
              return;
            }
            const { data: allComments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber });
            for (const c of allComments) {
              if (c.user.type === 'Bot' && c.body.includes('Template Validation Failed') && (c.body.includes('Missing Required') || c.body.includes('Missing SRType') || c.body.includes('Missing CatalogueItem'))) {
                await github.rest.issues.deleteComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id });
              }
            }
            if (!issueTitle.startsWith('[SR-Change]:')) {
              await failValidation(`❌ Template Validation Failed\n\nTitle must start with \`[SR-Change]:\`.`, 'Title format invalid');
              return;
            }
            const rulesets = {
              'CatalogueItem/Generic Requests': { requiredFields: ['Short Description','Description','Priority','Impact','Impact Description (Overall)','Impact Description (Customer)','Environment Details','Affected Component','Affected Services','Service Outage/Downtime','Is a maintenance window required or not','Implementation Plan','Test Plan','Monitoring Checks'] },
              'CatalogueItem/Request Logs': { requiredFields: ['Short Description','Description','Priority','Impact','Impact Description','Customer Project','Environment Details'], allowedValues: { Priority: ['Critical'] } },
              'CatalogueItem/Standard Generic': { requiredFields: ['Short Description','Description','Priority','Impact','Environment Details'] },
              'CatalogueItem/Information': { requiredFields: ['Request Description','Impact','Customer Project'] }
            };
            const rules = rulesets[catalogLabel];
            if (!rules) {
              await failValidation(`❌ Template Validation Failed\n\nUnknown catalog: **${catalogLabel}**`, 'Unknown catalog type');
              return;
            }
            const bodyLower = issueBody.toLowerCase();
            const missing = rules.requiredFields.filter(f => !bodyLower.includes(f.toLowerCase()));
            if (missing.length) {
              await failValidation(`❌ Template Validation Failed\n\n**Missing fields for ${catalogLabel}:**\n` + missing.map(f => `- ${f}`).join('\n'), 'Missing: ' + missing.join(', '));
              return;
            }
            if (rules.allowedValues && rules.allowedValues.Priority) {
              const priRaw = sectionAfterHeader(issueBody, 'Priority');
              const allowed = rules.allowedValues.Priority;
              const okPri = allowed.some(a => priRaw.toLowerCase().includes(a.toLowerCase()));
              if (!okPri) {
                await failValidation(
                  `❌ Template Validation Failed\n\n**Invalid Priority for ${catalogLabel}.**\n\nAllowed: ${allowed.join(', ')}\n\nFound: \`${priRaw || '(empty)'}\``,
                  'Priority not allowed for catalog'
                );
                return;
              }
            }
            const { data: finalComments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber });
            for (const c of finalComments) {
              if (c.user.type === 'Bot' && c.body.includes('Template Validation')) {
                await github.rest.issues.deleteComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: c.id });
              }
            }
            await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, labels: ['validation-passed'] });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber,
              body: `✅ Template Validation Passed\n\n**${catalogLabel}** — case will be created automatically.`
            });
            core.setOutput('validation_passed', 'true');
            core.setOutput('sr_type', srTypeLabel.replace('SRType/', ''));
            core.setOutput('case_type', 'Service Request');
            core.setOutput('catalog_item', catalogLabel.replace('CatalogueItem/', ''));
            core.setOutput('catalog_prefix', catalogLabel);
            core.setOutput('failure_reason', '');

  create-case:
    needs: [gate, validate]
    if: needs.validate.outputs.validation_passed == 'true'
    uses: ./.github/workflows/servicenow-create-case.yml
    secrets: inherit
    with:
      issue_number: ${{ needs.gate.outputs.issue_number }}
      catalog_item: ${{ needs.validate.outputs.catalog_item }}
      case_type: ${{ needs.validate.outputs.case_type }}
      sr_type: ${{ needs.validate.outputs.sr_type }}
      catalog_prefix: ${{ needs.validate.outputs.catalog_prefix }}

  update-case:
    needs: gate
    if: needs.gate.outputs.should_update == 'true'
    uses: ./.github/workflows/servicenow-update-case.yml
    secrets: inherit
    with:
      issue_number: ${{ needs.gate.outputs.issue_number }}

  cr-watch:
    needs: [gate, validate, create-case]
    if: needs.create-case.outputs.sn_success == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        env:
          SERVICENOW_UI_URL: ${{ secrets.SERVICENOW_UI_URL }}
        with:
          script: |
            const issueNumber = parseInt('${{ needs.gate.outputs.issue_number }}', 10);
            const caseNumber = `${{ needs.create-case.outputs.case_number }}`;
            const caseSysId = `${{ needs.create-case.outputs.case_sys_id }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber,
              body: `👀 Watching for Change Requests\n\nServiceNow case **${caseNumber || 'created'}** is monitored for CRs.\n\n---\n*GitHub Actions*`
            });
